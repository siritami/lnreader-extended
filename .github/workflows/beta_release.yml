name: Beta Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Select build target'
        required: true
        default: 'Build all'
        type: choice
        options:
          - Build all
          - All Architectures
          - arm64-v8a
          - armeabi-v7a
          - x86
          - x86_64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL='[
            {"name":"All Architectures","abi":"all","apk_suffix":"universal"},
            {"name":"arm64-v8a","abi":"arm64-v8a","apk_suffix":"arm64-v8a"},
            {"name":"armeabi-v7a","abi":"armeabi-v7a","apk_suffix":"armeabi-v7a"},
            {"name":"x86","abi":"x86","apk_suffix":"x86"},
            {"name":"x86_64","abi":"x86_64","apk_suffix":"x86_64"}
          ]'

          BUILD_TARGET="${{ inputs.build_target }}"

          if [[ "${{ github.event_name }}" == "push" || "$BUILD_TARGET" == "Build all" || -z "$BUILD_TARGET" ]]; then
            MATRIX="$ALL"
          else
            MATRIX=$(echo "$ALL" | jq -c --arg name "$BUILD_TARGET" '[.[] | select(.name == $name)]')
          fi

          echo "matrix={\"include\":$(echo $MATRIX | jq -c '.')}" >> $GITHUB_OUTPUT

  build-and-release:
    name: Build & Release ${{ matrix.name }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm Store Directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Environment File
        run: |
          cat > .env << EOF
          MYANIMELIST_CLIENT_ID=${{ vars.MYANIMELIST_CLIENT_ID }}
          ANILIST_CLIENT_ID=${{ vars.ANILIST_CLIENT_ID }}
          GIT_HASH=$(git rev-parse --short HEAD)
          RELEASE_DATE=$(date --utc +'%d/%m/%y %I:%M %p %Z')
          BUILD_TYPE=Beta Release
          EOF

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo $KEYSTORE_B64 | base64 --decode > android/app/release.keystore

      - name: Make Gradlew Executable
        run: cd android && chmod +x ./gradlew

      - name: Set Environment Variables
        run: |
          echo "COMMIT_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_ENV
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Android Release
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          COMMIT_COUNT: ${{ env.COMMIT_COUNT }}
          COMMIT_ID: ${{ env.COMMIT_ID }}
        run: |
          if [[ "${{ matrix.abi }}" == "all" ]]; then
            cd android && ./gradlew assembleRelease --build-cache
          else
            cd android && ./gradlew assembleRelease --build-cache -PreactNativeArchitectures=${{ matrix.abi }}
          fi
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/LNReader-beta-${{ matrix.apk_suffix }}.apk

      - name: Create Release Note
        run: |
          echo "Github Actions Auto Build" > release_note.txt
          echo "- **Commit Hash**: [${{ env.COMMIT_ID }}](https://github.com/${{ github.repository }}/commit/${{ env.COMMIT_ID }})" >> release_note.txt
          echo "- **Total Commits**: ${{ env.COMMIT_COUNT }}" >> release_note.txt

      - name: Create or Update Beta Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: "LNReader Beta"
          body_path: release_note.txt
          prerelease: true
          make_latest: false
          files: |
            android/app/build/outputs/apk/release/LNReader-beta-${{ matrix.apk_suffix }}.apk
